{% extends 'base.html' %}
{% block title %}Schedule Appointment{% endblock %}
{% block page_title %}Schedule Appointment{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7">
  <div class="card">
    <div class="card-header"><i class="fas fa-calendar-plus me-2 text-primary"></i>Schedule New Appointment</div>
    <div class="card-body">
      <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Patient *</label>
          <select name="patient" class="form-select" required>
            <option value="">Select patient...</option>
            {% for p in patients %}<option value="{{ p.id }}">{{ p.user.get_full_name }}</option>{% endfor %}
          </select>
        </div>
        <div class="mb-3"><label class="form-label">Doctor *</label>
          <select name="doctor" class="form-select" required>
            <option value="">Select doctor...</option>
            {% for d in doctors %}<option value="{{ d.id }}">Dr. {{ d.user.get_full_name }} — {{ d.specialization }}</option>{% endfor %}
          </select>
        </div>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Date *</label><input type="date" name="appointment_date" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Time *</label><input type="time" name="appointment_time" class="form-control" required></div>
        </div>
        <div class="mb-3 mt-3"><label class="form-label">Priority</label>
          <select name="priority" class="form-select">
            {% for val,label in priority_choices %}<option value="{{ val }}" {% if val == 'normal' %}selected{% endif %}>{{ label }}</option>{% endfor %}
          </select>
        </div>
        <div class="mb-3"><label class="form-label">Reason</label><textarea name="reason" class="form-control" rows="3"></textarea></div>
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-1"></i>Schedule</button>
          <a href="{% url 'appointment_list' %}" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
