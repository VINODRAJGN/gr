{% extends 'base.html' %}
{% block title %}Register - MediCare HMS{% endblock %}
{% block public_content %}
<div style="min-height:100vh;background:linear-gradient(135deg,#0d2137,#1a3a5c);display:flex;align-items:center;justify-content:center;padding:30px 20px;">
  <div style="width:100%;max-width:600px;">
    <div class="text-center mb-4"><a href="/" style="color:#fff;text-decoration:none;"><i class="fas fa-hospital-alt fa-2x mb-2 d-block"></i><h4 class="fw-700">MediCare HMS</h4></a></div>
    {% for msg in messages %}
    <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}{{ msg.tags }}{% endif %} alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    {% endfor %}
    <div class="card p-4">
      <h5 class="fw-600 mb-4 text-center">Create Account</h5>
      <form method="post" id="regForm">{% csrf_token %}
        <div class="mb-3"><label class="form-label fw-500">Register As</label>
          <select name="role" class="form-select" id="roleSelect" onchange="toggleFields()">
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
            <option value="appointment_manager">Appointment Manager</option>
          </select></div>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Username</label><input type="text" name="username" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Address</label><input type="text" name="address" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required minlength="6"></div>
          <div class="col-md-6"><label class="form-label">Confirm Password</label><input type="password" name="confirm_password" class="form-control" required></div>
        </div>
        <div id="patientFields" class="row g-3 mt-1">
          <div class="col-md-4"><label class="form-label">Age</label><input type="number" name="age" class="form-control" min="0" max="150"></div>
          <div class="col-md-4"><label class="form-label">Gender</label>
            <select name="gender" class="form-select"><option>Male</option><option>Female</option><option>Other</option></select></div>
          <div class="col-md-4"><label class="form-label">Blood Group</label>
            <select name="blood_group" class="form-select"><option value="">-</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div>
        </div>
        <div id="doctorFields" class="row g-3 mt-1" style="display:none!important;">
          <div class="col-md-6"><label class="form-label">Specialization</label>
            <select name="specialization" class="form-select"><option value="">Select existing</option>{% for s in specializations %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div>
          <div class="col-md-6"><label class="form-label">Or Add New Specialization</label><input type="text" name="new_specialization" class="form-control" placeholder="e.g. Cardiology"></div>
          <div class="col-md-6"><label class="form-label">Experience (Years)</label><input type="number" name="experience_years" class="form-control" min="0"></div>
          <div class="col-md-6"><label class="form-label">Qualification</label><input type="text" name="qualification" class="form-control" placeholder="MBBS, MD..."></div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 mt-4 fw-600">Create Account</button>
      </form>
      <hr><p class="text-center mb-0 text-muted small">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
  </div>
</div>
<script>
function toggleFields(){
  var r=document.getElementById('roleSelect').value;
  document.getElementById('patientFields').style.display=r==='patient'?'':'none';
  document.getElementById('doctorFields').style.display=r==='doctor'?'':'none';
}
toggleFields();
</script>
{% endblock %}
