{% extends 'base.html' %}
{% block title %}Edit Patient{% endblock %}
{% block page_title %}Edit Patient{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7">
  <div class="card">
    <div class="card-header"><i class="fas fa-edit me-2 text-success"></i>Edit: {{ patient.user.get_full_name }}</div>
    <div class="card-body">
      <form method="post">{% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" value="{{ patient.user.first_name }}"></div>
          <div class="col-md-6"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ patient.user.last_name }}"></div>
          <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ patient.user.email }}"></div>
          <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ patient.phone }}"></div>
          <div class="col-md-4"><label class="form-label">Age</label><input type="number" name="age" class="form-control" value="{{ patient.age }}"></div>
          <div class="col-md-4"><label class="form-label">Gender</label><select name="gender" class="form-select"><option {% if patient.gender == 'Male' %}selected{% endif %}>Male</option><option {% if patient.gender == 'Female' %}selected{% endif %}>Female</option><option {% if patient.gender == 'Other' %}selected{% endif %}>Other</option></select></div>
          <div class="col-md-4"><label class="form-label">Blood Group</label><select name="blood_group" class="form-select"><option value="">-</option>{% for bg in 'A+,A-,B+,B-,AB+,AB-,O+,O-'|split:',' %}<option {% if patient.blood_group == bg %}selected{% endif %}>{{ bg }}</option>{% endfor %}</select></div>
          <div class="col-md-6"><label class="form-label">Emergency Contact</label><input type="text" name="emergency_contact" class="form-control" value="{{ patient.emergency_contact }}"></div>
          <div class="col-12"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2">{{ patient.address }}</textarea></div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-success px-4"><i class="fas fa-save me-1"></i>Update Patient</button>
          <a href="{% url 'patient_list' %}" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
