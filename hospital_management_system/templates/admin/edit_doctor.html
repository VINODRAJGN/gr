{% extends 'base.html' %}
{% block title %}Edit Doctor{% endblock %}
{% block page_title %}Edit Doctor{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8">
  <div class="card">
    <div class="card-header"><i class="fas fa-edit me-2 text-primary"></i>Edit: Dr. {{ doctor.user.get_full_name }}</div>
    <div class="card-body">
      <form method="post">{% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" value="{{ doctor.user.first_name }}"></div>
          <div class="col-md-6"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ doctor.user.last_name }}"></div>
          <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ doctor.user.email }}"></div>
          <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ doctor.phone }}"></div>
          <div class="col-md-6"><label class="form-label">Specialization</label>
            <select name="specialization" class="form-select">{% for s in specializations %}<option value="{{ s.id }}" {% if doctor.specialization == s %}selected{% endif %}>{{ s.name }}</option>{% endfor %}</select></div>
          <div class="col-md-6"><label class="form-label">Experience (Years)</label><input type="number" name="experience_years" class="form-control" value="{{ doctor.experience_years }}"></div>
          <div class="col-md-6"><label class="form-label">Qualification</label><input type="text" name="qualification" class="form-control" value="{{ doctor.qualification }}"></div>
          <div class="col-md-6"><label class="form-label">Available From</label><input type="time" name="available_from" class="form-control" value="{{ doctor.available_from|time:'H:i' }}"></div>
          <div class="col-md-6"><label class="form-label">Available To</label><input type="time" name="available_to" class="form-control" value="{{ doctor.available_to|time:'H:i' }}"></div>
          <div class="col-12"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2">{{ doctor.address }}</textarea></div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-1"></i>Update Doctor</button>
          <a href="{% url 'doctor_list' %}" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
