{% extends 'base.html' %}
{% block title %}Add Patient{% endblock %}
{% block page_title %}Add New Patient{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7">
  <div class="card">
    <div class="card-header"><i class="fas fa-procedures me-2 text-success"></i>Patient Information</div>
    <div class="card-body">
      <form method="post">{% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">First Name *</label><input type="text" name="first_name" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Last Name *</label><input type="text" name="last_name" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Username *</label><input type="text" name="username" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Email *</label><input type="email" name="email" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Password</label><input type="password" name="password" class="form-control" placeholder="Default: patient123"></div>
          <div class="col-md-6"><label class="form-label">Phone *</label><input type="text" name="phone" class="form-control" required></div>
          <div class="col-md-4"><label class="form-label">Age</label><input type="number" name="age" class="form-control" min="0"></div>
          <div class="col-md-4"><label class="form-label">Gender</label><select name="gender" class="form-select"><option>Male</option><option>Female</option><option>Other</option></select></div>
          <div class="col-md-4"><label class="form-label">Blood Group</label><select name="blood_group" class="form-select"><option value="">-</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div>
          <div class="col-12"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-success px-4"><i class="fas fa-save me-1"></i>Add Patient</button>
          <a href="{% url 'patient_list' %}" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
