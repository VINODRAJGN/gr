{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
  <div class="card text-center">
    <div class="card-body py-5">
      <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
      <h5 class="fw-600">Are you sure?</h5>
      <p class="text-muted">This will permanently delete <strong>{{ object }}</strong> and all related data.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">{% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
        <a href="javascript:history.back()" class="btn btn-light px-4">Cancel</a>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
