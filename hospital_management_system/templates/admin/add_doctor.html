{% extends 'base.html' %}
{% block title %}Add Doctor{% endblock %}
{% block page_title %}Add New Doctor{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8">
  <div class="card">
    <div class="card-header"><i class="fas fa-user-md me-2 text-primary"></i>Doctor Information</div>
    <div class="card-body">
      <form method="post">{% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">First Name *</label><input type="text" name="first_name" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Last Name *</label><input type="text" name="last_name" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Username *</label><input type="text" name="username" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Email *</label><input type="email" name="email" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Password</label><input type="password" name="password" class="form-control" placeholder="Default: doctor123"></div>
          <div class="col-md-6"><label class="form-label">Phone *</label><input type="text" name="phone" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label">Specialization</label>
            <select name="specialization" class="form-select"><option value="">Select existing</option>{% for s in specializations %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div>
          <div class="col-md-6"><label class="form-label">Or New Specialization</label><input type="text" name="new_specialization" class="form-control" placeholder="e.g. Cardiology"></div>
          <div class="col-md-6"><label class="form-label">Experience (Years)</label><input type="number" name="experience_years" class="form-control" min="0" value="0"></div>
          <div class="col-md-6"><label class="form-label">Qualification</label><input type="text" name="qualification" class="form-control" placeholder="MBBS, MD, etc."></div>
          <div class="col-md-6"><label class="form-label">Available From</label><input type="time" name="available_from" class="form-control" value="09:00"></div>
          <div class="col-md-6"><label class="form-label">Available To</label><input type="time" name="available_to" class="form-control" value="17:00"></div>
          <div class="col-12"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-1"></i>Add Doctor</button>
          <a href="{% url 'doctor_list' %}" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
